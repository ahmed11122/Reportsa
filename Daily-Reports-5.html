<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التقرير اليومي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef1f6;
    --card:#ffffff;
    --ink:#1e2530;
    --ink-soft:#7c8494;
    --line:#e1e5ec;
    --ok:#1f8a5f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    font-family:'IBM Plex Sans Arabic',sans-serif;
    color:var(--ink);
    min-height:100vh;
    padding:32px 18px 90px;
  }
  .wrap{max-width:880px;margin:0 auto;}

  header{
    display:flex; align-items:flex-end; justify-content:space-between;
    gap:16px; margin-bottom:26px; flex-wrap:wrap;
  }
  .title-block h1{
    font-family:'IBM Plex Sans Arabic'; font-weight:700; font-size:1.9rem; margin:0 0 4px;
    letter-spacing:.2px;
    color:var(--ink);
  }
  .title-block p{margin:0;color:var(--ink-soft);font-size:.9rem;font-weight:500;}

  .datebar{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:10px 12px; box-shadow:0 1px 2px rgba(30,37,48,.04);
  }
  .datebar button{
    background:#f4f6fa; border:1px solid var(--line); color:var(--ink);
    border-radius:9px; padding:8px 13px; font-family:'IBM Plex Sans Arabic';font-weight:600;
    cursor:pointer; font-size:.85rem; transition:.15s;
  }
  .datebar button:hover{background:var(--ink);color:#fff;border-color:var(--ink);}
  .datebar input[type="date"]{
    font-family:'IBM Plex Mono',monospace; border:1px solid var(--line);
    border-radius:9px;padding:7px 9px;background:#fff;color:var(--ink);font-size:.85rem;
  }

  .status{
    font-size:.82rem;color:var(--ink-soft);min-height:1.2em; margin:6px 2px 20px;
  }
  .status.saved{color:var(--ok);font-weight:700;}

  /* Folder-tab cards */
  .entry{
    position:relative;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:0 14px 14px 14px;
    margin:22px 0 0;
    box-shadow:0 1px 3px rgba(30,37,48,.05);
  }
  .entry .tab{
    position:absolute; top:-22px; inset-inline-start:0;
    display:flex; align-items:center; gap:8px;
    padding:7px 16px 9px;
    border-radius:10px 10px 0 0;
    font-family:'IBM Plex Sans Arabic'; font-weight:600; font-size:.94rem;
    color:#fff;
  }
  .entry .tab .dot{
    width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.85);
  }
  .entry .body{ padding:20px; }
  .entry textarea{
    width:100%; resize:none; overflow:hidden; display:block;
    background:transparent; border:none;
    font-family:'IBM Plex Sans Arabic'; font-size:1rem; color:var(--ink);
    line-height:1.9; min-height:1.9em;
  }
  .entry textarea:focus{outline:none;}
  .entry textarea::placeholder{color:#b7bdc9;}

  .mic-row{
    display:flex; align-items:center; gap:10px; margin-bottom:10px;
  }
  .mic-btn{
    display:flex; align-items:center; gap:6px;
    border:1.5px solid var(--line); background:#f4f6fa; color:var(--ink);
    border-radius:999px; padding:6px 14px; font-family:'IBM Plex Sans Arabic';
    font-weight:600; font-size:.8rem; cursor:pointer; transition:.15s;
    flex-shrink:0;
  }
  .mic-btn:hover{background:#e8ecf3;}
  .mic-btn.listening{
    background:#c0392b; color:#fff; border-color:#c0392b;
    animation:pulse 1.4s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(192,57,43,.45);}
    70%{box-shadow:0 0 0 9px rgba(192,57,43,0);}
    100%{box-shadow:0 0 0 0 rgba(192,57,43,0);}
  }
  .mic-hint{font-size:.76rem;color:var(--ink-soft); display:flex; align-items:center; gap:5px;}
  .mic-hint.thinking{color:#3b6fd1; font-weight:600;}
  .think-dots{display:inline-flex; gap:2px;}
  .think-dots span{
    width:4px;height:4px;border-radius:50%;background:currentColor;
    animation:think-bounce 1s infinite ease-in-out;
  }
  .think-dots span:nth-child(2){animation-delay:.15s;}
  .think-dots span:nth-child(3){animation-delay:.3s;}
  @keyframes think-bounce{
    0%,60%,100%{opacity:.25; transform:translateY(0);}
    30%{opacity:1; transform:translateY(-2px);}
  }
  .mic-btn.thinking{
    background:#eef1f6; color:#3b6fd1; border-color:#3b6fd1;
  }

  .ai-mic-bar{
    display:flex; flex-direction:column; align-items:center; gap:6px;
    margin:14px 0 10px;
  }
  .ai-mic-btn{
    background:linear-gradient(135deg,#5b6ee8,#7c4de8); color:#fff; border:none;
    border-radius:999px; padding:12px 22px; font-family:'IBM Plex Sans Arabic';
    font-weight:700; font-size:.92rem; cursor:pointer; transition:.15s;
    box-shadow:0 3px 10px rgba(91,110,232,.3);
  }
  .ai-mic-btn:hover{filter:brightness(1.08);}
  .ai-mic-btn.listening{
    background:#c0392b; animation:pulse 1.4s infinite;
  }
  .ai-mic-btn.thinking{
    background:linear-gradient(135deg,#3b6fd1,#5b6ee8);
  }
  .ai-mic-btn:disabled{opacity:.5; cursor:not-allowed;}
  .ai-mic-hint{font-size:.8rem; color:var(--ink-soft); min-height:1.2em; text-align:center;}
  @media print{ .ai-mic-bar{display:none !important;} }
  @media print{ .mic-row{display:none !important;} }

  /* Login screen */
  #loginScreen{
    position:fixed; inset:0; background:var(--bg); z-index:100;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  #loginScreen.hidden{display:none;}
  .login-card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:32px 26px; width:100%; max-width:360px;
    box-shadow:0 4px 18px rgba(30,37,48,.08); text-align:center;
  }
  .login-card h2{margin:0 0 6px; font-size:1.3rem;}
  .login-card p{margin:0 0 18px; color:var(--ink-soft); font-size:.85rem;}
  .login-card input{
    width:100%; padding:11px 13px; margin-bottom:10px; border-radius:10px;
    border:1px solid var(--line); font-family:'IBM Plex Sans Arabic';
    font-size:.92rem; text-align:right;
  }
  .login-card button{
    width:100%; padding:11px; border:none; border-radius:10px;
    background:var(--ok); color:#fff; font-weight:700; font-family:'IBM Plex Sans Arabic';
    font-size:.95rem; cursor:pointer; margin-top:4px;
  }
  .login-card button:hover{filter:brightness(1.08);}
  .login-error{color:#c0392b; font-size:.8rem; min-height:1.2em; margin-top:8px;}

  #appWrap.hidden{display:none;}
  #logoutBar{display:flex; justify-content:flex-end; margin-bottom:6px;}
  #logoutBtn{
    background:none; border:1px solid var(--line); border-radius:9px;
    padding:6px 12px; font-family:'IBM Plex Sans Arabic'; font-size:.78rem;
    color:var(--ink-soft); cursor:pointer;
  }
  #logoutBtn:hover{background:#f4f6fa;}

  /* Review modal */
  #reviewModal{
    position:fixed; inset:0; background:rgba(20,24,32,.45); z-index:90;
    display:flex; align-items:center; justify-content:center; padding:16px;
  }
  #reviewModal.hidden{display:none;}
  .review-card{
    background:var(--card); border-radius:16px; width:100%; max-width:480px;
    max-height:80vh; display:flex; flex-direction:column; overflow:hidden;
    box-shadow:0 8px 30px rgba(0,0,0,.2);
  }
  .review-head{
    display:flex; justify-content:space-between; align-items:center;
    padding:16px 18px; border-bottom:1px solid var(--line);
  }
  .review-head h3{margin:0; font-size:1.05rem;}
  .review-head button{background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--ink-soft);}
  .review-list{overflow-y:auto; padding:8px;}
  .review-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 12px; border-radius:10px; cursor:pointer; gap:10px;
  }
  .review-item:hover{background:#f4f6fa;}
  .review-item .rdate{font-weight:600; font-size:.9rem;}
  .review-item .rpreview{color:var(--ink-soft); font-size:.78rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:230px;}
  .review-empty{padding:24px; text-align:center; color:var(--ink-soft); font-size:.85rem;}
  .print-text{
    display:none;
    font-family:'IBM Plex Sans Arabic', Arial, sans-serif; font-size:11pt; color:#1e2530;
    line-height:1.65; white-space:pre-wrap; word-wrap:break-word; overflow-wrap:break-word;
    direction:rtl; text-align:right;
  }

  .c1 .tab{background:#3b6fd1;} .c1{border-top:3px solid #3b6fd1;}
  .c2 .tab{background:#1f9e8c;} .c2{border-top:3px solid #1f9e8c;}
  .c3 .tab{background:#c98a1f;} .c3{border-top:3px solid #c98a1f;}
  .c4 .tab{background:#d15b4a;} .c4{border-top:3px solid #d15b4a;}
  .c5 .tab{background:#7a5bd1;} .c5{border-top:3px solid #7a5bd1;}
  .c6 .tab{background:#4a5568;} .c6{border-top:3px solid #4a5568;}
  .c7 .tab{background:#1e7d63;} .c7{border-top:3px solid #1e7d63;}

  .actions{
    position:sticky; bottom:16px; margin-top:30px;
    display:flex; gap:10px; flex-wrap:wrap; justify-content:center;
    background:var(--bg); padding-top:12px;
  }
  .actions button{
    font-family:'IBM Plex Sans Arabic'; font-weight:600; font-size:.9rem;
    border-radius:999px; padding:12px 22px; border:none; cursor:pointer;
    transition:.15s; box-shadow:0 2px 8px rgba(30,37,48,.12);
  }
  #saveBtn{background:var(--ok);color:#fff;}
  #saveBtn:hover{filter:brightness(1.08);}
  #wordBtn{background:#3b6fd1;color:#fff;}
  #wordBtn:hover{filter:brightness(1.08);}
  #pdfBtn{background:#c0392b;color:#fff;}
  #pdfBtn:hover{filter:brightness(1.08);}
  #copyBtn{background:var(--ink);color:#fff;}
  #copyBtn:hover{filter:brightness(1.15);}
  #printBtn{background:#fff;color:var(--ink);border:1.5px solid var(--line) !important;box-shadow:none;}
  #printBtn:hover{background:#f4f6fa;}

  footer.note{text-align:center;color:var(--ink-soft);font-size:.78rem;margin-top:18px;}

  .closing{
    text-align:center; margin:34px 0 0; padding-top:18px;
    border-top:1px solid var(--line);
    font-family:'IBM Plex Sans Arabic'; font-weight:600; font-size:1.02rem;
    color:var(--ink);
  }

  @media (max-width:600px){
    .title-block h1{font-size:1.5rem;}
    .entry .body{padding:16px;}
  }

  @media print{
    @page{ size:A4; margin:14mm 12mm; }
    *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; color-adjust:exact !important; }
    body{background:#fff;padding:0;}
    .datebar, .actions, footer.note, .status{display:none !important;}
    .entry{break-inside:avoid;box-shadow:none;margin-top:10px;border-color:#ccc;}
    .entry .tab{ position:static; border-radius:8px 8px 0 0; display:block; padding:6px 14px; font-size:.85rem; }
    .entry .body{ padding:10px 16px; }
    .entry textarea{display:none !important;}
    .print-text{display:block !important;}
    .entry.is-empty-print{display:none !important;}
    .closing{margin-top:16px;padding-top:10px;font-size:.95rem;}
  }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <h2>تسجيل الدخول</h2>
    <p>هذا التقرير خاص — الرجاء تسجيل الدخول للمتابعة</p>
    <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" autocomplete="username">
    <input type="password" id="loginPassword" placeholder="كلمة المرور" autocomplete="current-password">
    <button id="loginBtn">دخول</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div id="reviewModal" class="hidden">
  <div class="review-card">
    <div class="review-head">
      <h3>استعراض كل التقارير</h3>
      <button id="closeReview">✕</button>
    </div>
    <div class="review-list" id="reviewList"></div>
  </div>
</div>

<div class="wrap hidden" id="appWrap">
  <div id="logoutBar"><button id="logoutBtn">تسجيل الخروج</button></div>
  <header>
    <div class="title-block">
      <h1>التقرير اليومي</h1>
      <p id="dateLabel">—</p>
    </div>
  </header>

  <div class="datebar">
    <button id="prevDay">‹ السابق</button>
    <input type="date" id="datePicker">
    <button id="nextDay">التالي ›</button>
    <button id="todayBtn">اليوم</button>
    <button id="reviewBtn">🗂️ استعراض التقارير</button>
  </div>

  <div class="ai-mic-bar">
    <button id="aiMicBtn" class="ai-mic-btn">🎙️ تحدث بحرية (يفرز تلقائيًا بالذكاء الاصطناعي)</button>
    <div class="ai-mic-hint" id="aiMicHint"></div>
  </div>

  <div class="status" id="status"></div>

  <div id="sections"></div>

  <p class="closing">ولكم الأمر مع التقدير</p>

  <div class="actions">
    <button id="saveBtn">💾 حفظ محليًا</button>
    <button id="wordBtn">📄 تصدير Word</button>
    <button id="pdfBtn">🧾 تصدير PDF</button>
    <button id="copyBtn">📋 نسخ كنص</button>
    <button id="printBtn">🖨️ طباعة</button>
    <button id="backupBtn">⬇️ نسخة احتياطية (كل التقارير)</button>
    <button id="restoreBtn">⬆️ استعادة نسخة احتياطية</button>
    <input type="file" id="restoreInput" accept="application/json" style="display:none;">
  </div>

  <footer class="note" id="storageNote">يُحفظ التقرير في قاعدة بيانات Firebase ويمكن الوصول له من أي جهاز. لتصدير PDF، اختر "حفظ كملف PDF" من نافذة الطباعة التي تظهر.</footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import {
    getDatabase, ref, set, get, remove
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";
  import {
    getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAHhK28sG5Qdqu0Ma4ZGFjAuJ5eKByelm4",
    authDomain: "daily-reports-681d5.firebaseapp.com",
    databaseURL: "https://daily-reports-681d5-default-rtdb.firebaseio.com",
    projectId: "daily-reports-681d5",
    storageBucket: "daily-reports-681d5.firebasestorage.app",
    messagingSenderId: "204227839427",
    appId: "1:204227839427:web:863c8b27f45433f886a976",
    measurementId: "G-J9V8T4QL0N"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  window.firebaseReports = {
    async save(dateStr, data){
      await set(ref(db, 'reports/' + dateStr), data);
    },
    async load(dateStr){
      const snap = await get(ref(db, 'reports/' + dateStr));
      return snap.exists() ? snap.val() : null;
    },
    async loadAll(){
      const snap = await get(ref(db, 'reports'));
      return snap.exists() ? snap.val() : {};
    },
    async remove(dateStr){
      await remove(ref(db, 'reports/' + dateStr));
    }
  };

  window.firebaseAuth = {
    async login(email, password){
      return signInWithEmailAndPassword(auth, email, password);
    },
    async logout(){
      return signOut(auth);
    }
  };

  onAuthStateChanged(auth, (user) => {
    window.dispatchEvent(new CustomEvent('auth-changed', { detail: { user } }));
  });

  window.dispatchEvent(new Event('firebase-ready'));
</script>

<script>

<script>
const SECTIONS = [
  {key:"done",   title:"الأعمال المنجزة اليوم",           placeholder:"اكتب الأعمال التي أنجزتها اليوم...", cls:"c1"},
  {key:"visits", title:"الزيارات والاجتماعات",             placeholder:"الزيارات، الاجتماعات، الحضور...", cls:"c2"},
  {key:"market", title:"متابعة العملاء والسوق",            placeholder:"متابعات العملاء، السوق، التجار...", cls:"c3"},
  {key:"issues", title:"المشاكل أو المعوقات",              placeholder:"أي مشاكل أو معوقات واجهتك...", cls:"c4"},
  {key:"agree",  title:"الإجراءات والاتفاقات",             placeholder:"الإجراءات المتخذة والاتفاقات...", cls:"c5"},
  {key:"admin",  title:"المطلوب من الإدارة (إن وجد)",      placeholder:"اكتب هنا أو اترك فارغًا إن لم يوجد...", cls:"c6"},
  {key:"plan",   title:"خطة عمل الغد",                     placeholder:"ما المخطط له غدًا...", cls:"c7"},
];

const sectionsEl = document.getElementById('sections');
SECTIONS.forEach((s) => {
  const div = document.createElement('div');
  div.className = 'entry ' + s.cls;
  div.innerHTML = `
    <div class="tab"><span class="dot"></span>${s.title}</div>
    <div class="body">
      <div class="mic-row">
        <button type="button" class="mic-btn" id="mic-${s.key}" data-key="${s.key}">🎤 تحدث</button>
        <span class="mic-hint" id="mic-hint-${s.key}"></span>
      </div>
      <textarea id="ta-${s.key}" placeholder="${s.placeholder}" rows="1"></textarea>
      <div class="print-text" id="pt-${s.key}"></div>
    </div>
  `;
  sectionsEl.appendChild(div);
});

function autosize(el){
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function autosizeAll(){
  SECTIONS.forEach(s => {
    const ta = document.getElementById('ta-'+s.key);
    if(ta) autosize(ta);
  });
}

// Fonts loading late can change line-height after the box was already
// sized, leaving stale (too-tall) boxes. Recalculate once fonts are ready
// and again on resize/orientation change.
if(document.fonts && document.fonts.ready){
  document.fonts.ready.then(autosizeAll);
}
window.addEventListener('load', autosizeAll);
window.addEventListener('resize', autosizeAll);

const datePicker = document.getElementById('datePicker');
const dateLabel = document.getElementById('dateLabel');
const statusEl = document.getElementById('status');

function ymd(d){ return d.toISOString().slice(0,10); }
function toArabicLabel(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('ar-EG', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

let currentDate = ymd(new Date());
let saveTimer = null;
let lastKnownUpdatedAt = null; // updatedAt of the version we last loaded/saved, for conflict checks
let isDirty = false;           // true whenever there are unsaved changes

function markDirty(){ isDirty = true; }
function markClean(){ isDirty = false; }

async function loadDay(dateStr){
  currentDate = dateStr;
  lastKnownUpdatedAt = null;
  markClean();
  datePicker.value = dateStr;
  dateLabel.textContent = toArabicLabel(dateStr);

  SECTIONS.forEach(s => {
    const ta = document.getElementById('ta-'+s.key);
    ta.value = '';
    autosize(ta);
  });

  statusEl.textContent = 'جارٍ التحميل...';
  statusEl.className = 'status';

  let data = null;
  let fromCache = false;

  try{
    if(window.firebaseReports){
      data = await window.firebaseReports.load(dateStr);
    }
  }catch(e){
    console.error('Firebase load failed, falling back to local cache', e);
  }

  if(!data){
    try{
      const raw = localStorage.getItem('report:' + dateStr);
      if(raw){ data = JSON.parse(raw); fromCache = true; }
    }catch(e){}
  }

  if(data){
    SECTIONS.forEach(s => {
      const ta = document.getElementById('ta-'+s.key);
      ta.value = data[s.key] || '';
      autosize(ta);
    });
    lastKnownUpdatedAt = data.updatedAt || null;
    statusEl.textContent = fromCache
      ? 'تم تحميل نسخة محلية (بدون اتصال)'
      : 'تم تحميل تقرير محفوظ';
  } else {
    statusEl.textContent = 'لا يوجد تقرير محفوظ لهذا اليوم بعد';
  }
  statusEl.className = 'status';
}

async function saveDay(showStatus = true, force = false){
  const data = {};
  SECTIONS.forEach(s => data[s.key] = document.getElementById('ta-'+s.key).value);
  const dateBeingSaved = currentDate;

  // Always cache locally first so nothing is lost if the network drops.
  try{ localStorage.setItem('report:' + dateBeingSaved, JSON.stringify(data)); }catch(e){}

  try{
    if(window.firebaseReports){
      // Conflict check: has this report changed remotely (e.g. from another
      // device/tab) since we last loaded it? If so, don't blindly overwrite.
      if(!force){
        const remote = await window.firebaseReports.load(dateBeingSaved);
        const remoteUpdatedAt = remote ? (remote.updatedAt || null) : null;
        if(remoteUpdatedAt && lastKnownUpdatedAt && remoteUpdatedAt !== lastKnownUpdatedAt){
          statusEl.textContent = '⚠️ تم تعديل هذا التقرير من جهاز آخر — أعد تحميل الصفحة قبل الحفظ لتفادي فقدان بيانات';
          statusEl.className = 'status';
          return;
        }
      }
      data.updatedAt = Date.now();
      await window.firebaseReports.save(dateBeingSaved, data);
      if(dateBeingSaved === currentDate) lastKnownUpdatedAt = data.updatedAt;

// ---------- Voice dictation (Web Speech API) ----------
// NOTE: continuous:true on Android Chrome has a known bug where it silently
// restarts internally and re-fires the same final result again, duplicating
// text. To avoid that, we run short single-utterance sessions and restart
// them automatically after each pause, as long as the user hasn't pressed stop.
const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
let activeRecognition = null;
let activeKey = null;
let micWantsToListen = false; // user's intent; false when they pressed stop

function stopListening(){
  micWantsToListen = false;
  if(activeRecognition){
    try{ activeRecognition.stop(); }catch(e){}
  }
}

function setMicState(micBtn, hintEl, state){
  // state: 'listening' | 'thinking' | 'off' | 'error'
  micBtn.classList.remove('listening', 'thinking');
  if(state === 'listening'){
    micBtn.classList.add('listening');
    micBtn.textContent = '⏹ إيقاف';
    hintEl.className = 'mic-hint';
    hintEl.textContent = 'جارٍ الاستماع...';
  } else if(state === 'thinking'){
    micBtn.classList.add('thinking');
    micBtn.textContent = '⏹ إيقاف';
    hintEl.className = 'mic-hint thinking';
    hintEl.innerHTML = 'خذ وقتك، أنا منتظر <span class="think-dots"><span></span><span></span><span></span></span>';
  } else if(state === 'off'){
    micBtn.textContent = '🎤 تحدث';
    hintEl.className = 'mic-hint';
    hintEl.textContent = '';
  }
}

SECTIONS.forEach(s => {
  const micBtn = document.getElementById('mic-'+s.key);
  const hintEl = document.getElementById('mic-hint-'+s.key);

  if(!SpeechRecognitionCtor){
    micBtn.disabled = true;
    micBtn.style.opacity = '.5';
    hintEl.textContent = 'التعرف على الصوت غير مدعوم في هذا المتصفح (جرّب Chrome)';
    return;
  }

  function startSession(){
    const ta = document.getElementById('ta-'+s.key);
    const recognition = new SpeechRecognitionCtor();
    recognition.lang = 'ar-SA';
    recognition.continuous = false;   // one utterance per session, restarted manually below
    recognition.interimResults = true;

    // Text already committed to the box before this session started.
    const baseText = ta.value;
    let sessionFinal = ''; // final transcript captured once for this session

    recognition.onstart = () => {
      activeRecognition = recognition;
      activeKey = s.key;
      setMicState(micBtn, hintEl, 'listening');
    };

    recognition.onresult = (event) => {
      let interim = '';
      for(let i = 0; i < event.results.length; i++){
        const transcript = event.results[i][0].transcript;
        if(event.results[i].isFinal){
          sessionFinal = transcript; // one final result per non-continuous session
        } else {
          interim = transcript;
        }
      }
      setMicState(micBtn, hintEl, 'listening');
      const sep = baseText && !/[\s\n]$/.test(baseText) ? ' ' : '';
      ta.value = baseText + sep + (sessionFinal || interim);
      markDirty();
      autosize(ta);
    };

    recognition.onerror = (event) => {
      if(event.error === 'no-speech' || event.error === 'aborted'){
        return; // expected during pauses to think; onend will show "thinking" and restart
      }
      hintEl.className = 'mic-hint';
      hintEl.textContent = event.error === 'not-allowed'
        ? 'يجب السماح باستخدام الميكروفون'
        : 'حدث خطأ في التعرف على الصوت';
      if(event.error === 'not-allowed') micWantsToListen = false;
    };

    recognition.onend = () => {
      if(activeKey === s.key) activeRecognition = null;

      if(micWantsToListen && activeKey === s.key){
        // Person likely paused to think — show a "thinking" state, then
        // quietly start the next listening session in the background.
        setMicState(micBtn, hintEl, 'thinking');
        setTimeout(() => { if(micWantsToListen && activeKey === s.key) startSession(); }, 250);
      } else {
        setMicState(micBtn, hintEl, 'off');
        activeKey = null;
        statusEl.textContent = 'جارٍ الكتابة...';
        statusEl.className = 'status';
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => saveDay(true), 1200);
      }
    };

    recognition.start();
  }

  micBtn.addEventListener('click', () => {
    // If this section is already listening, stop it.
    if(activeKey === s.key){
      stopListening();
      return;
    }
    // If another section is listening, stop it first.
    if(activeRecognition){
      stopListening();
    }
    micWantsToListen = true;
    startSession();
  });
});

function rtfEscapeUnicode(str){
  let out = '';
  for (const ch of str) {
    const code = ch.codePointAt(0);
    if (ch === '\\' || ch === '{' || ch === '}') {
      out += '\\' + ch;
    } else if (ch === '\n') {
      out += '\\par ';
    } else if (code < 128) {
      out += ch;
    } else {
      const signed = code > 32767 ? code - 65536 : code;
      out += `\\u${signed}?`;
    }
  }
  return out;
}

} else {
  function startAiSession(){
    const recognition = new SpeechRecognitionCtor();
    recognition.lang = 'ar-SA';
    recognition.continuous = false;
    recognition.interimResults = true;
    let sessionFinal = '';

    recognition.onstart = () => { aiRecognition = recognition; setAiMicState('listening'); };

    recognition.onresult = (event) => {
      let interim = '';
      for(let i = 0; i < event.results.length; i++){
        const t = event.results[i][0].transcript;
        if(event.results[i].isFinal) sessionFinal = t; else interim = t;
      }
      setAiMicState('listening');

    };

    recognition.onerror = (event) => {
      if(event.error === 'no-speech' || event.error === 'aborted') return;

        aiWantsToListen = false;

      }

      aiWantsToListen = false;

      else { finishAiListening(); } // no active session (was between restarts)

  };
  reader.readAsText(file);
  e.target.value = '';
});

</script>
